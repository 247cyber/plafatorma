<html lang="es">

    <meta charset="UTF-8">

</head>
<body>
    <header class="navbar">
        <div class="logo-container">
            <img src="imagen/logo.png" alt="Logo" class="main-logo">
        </div>
        <nav>
            <a href="index.html">INICIO</a>

    <section class="how-it-works">
        <h2 class="section-title">CONTACTO</h2>
        <div class="card middle" style="width: 100%; max-width: 500px; margin: 0 auto; text-align: left;">
            <form style="display: flex; flex-direction: column; gap: 15px;">
                <label>Nombre:</label>
                <input type="text" style="padding: 10px; border-radius: 5px; border: none;">
                <label>Correo:</label>
                <input type="email" style="padding: 10px; border-radius: 5px; border: none;">
                <label>Mensaje:</label>
                <textarea style="padding: 10px; border-radius: 5px; border: none; height: 100px;"></textarea>
                <button type="button" class="btn-main" style="background: #00bcd4;">Enviar Mensaje</button>
            </form>
        </div>
    </section>
    <footer class="main-footer">
        <div class="footer-content">
            <div class="logo">EASY<span>MATRIC</span></div>
            <div class="footer-links">
